<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CNM Hub" />
    <meta name="theme-color" content="#0B1628" />
    <meta name="description" content="CN Marseille — Plateforme de suivi Water-Polo" />

    <title>CNM Hub</title>

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-16x16.png" />
    <link rel="apple-touch-icon" href="/icon-180x180.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              cnm: {
                navy:    '#0B1628',   /* Fond principal — bleu marine profond */
                dark:    '#0D1F3C',   /* Fond secondaire */
                blue:    '#1A3A7A',   /* Bleu CNM moyen */
                gold:    '#E8B800',   /* Or CNM — accent principal */
                yellow:  '#F5D000',   /* Or clair */
                white:   '#F4F4F4',   /* Texte principal */
                gray:    '#8B9BB4',   /* Texte secondaire */
              },
              /* Alias pour compatibilité avec les anciens composants */
              nexus: {
                black:  '#0B1628',
                choco:  '#0D1F3C',
                red:    '#E8B800',   /* gold CNM */
                gold:   '#1A3A7A',   /* blue CNM */
                text:   '#F4F4F4',
                gray:   '#8B9BB4',
              }
            },
            fontFamily: {
              sans:    ['Montserrat', 'sans-serif'],
              display: ['Oswald', 'sans-serif'],
            }
          }
        }
      }
    </script>

    <style>
      body {
        background-color: #0B1628;
        color: #F4F4F4;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
      }

      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #0B1628; }
      ::-webkit-scrollbar-thumb { background: #1A3A7A; border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: #E8B800; }

      input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none; height: 24px; width: 24px;
        border-radius: 50%; background: #E8B800; border: 2px solid #fff;
        cursor: pointer; margin-top: -10px;
        box-shadow: 0 0 15px rgba(232,184,0,0.5); transition: transform 0.1s;
      }
      input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.1); }
      input[type=range]::-webkit-slider-runnable-track {
        width: 100%; height: 4px; cursor: pointer;
        background: rgba(255,255,255,0.1); border-radius: 2px;
      }
      input[type=range]:focus { outline: none; }
    </style>

    <script type="importmap">
{
  "imports": {
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
    </script>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('✅ SW enregistré'))
            .catch(err => console.log('❌ SW:', err));
        });
      }
    </script>
  </body>
</html>
